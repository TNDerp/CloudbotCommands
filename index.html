<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <title>Stream Commands</title>
  </head>
  <body>
    <header>
      <h1>Stream Commands</h1>
    </header>
    <main>
      <section class="command-list">
        <h2>Available Commands</h2>
        <ul>
          <li>
            <span class="command">!uptime</span>
            <span class="description">Displays how long the stream has been live.</span>
          </li>
          <li>
            <span class="command">!game</span>
            <span class="description">Shows the current game being played.</span>
          </li>
          <li>
            <span class="command">!discord</span>
            <span class="description">Provides the link to our Discord server.</span>
          </li>
          <li>
            <span class="command">!social</span>
            <span class="description">Lists our social media links.</span>
          </li>
          <!-- Add more commands as needed -->
        </ul>
      </section>
    </main>
    <footer>
      <p>&copy; 2025 TNDerp. All rights reserved.</p>
    </footer>
  </body>
</html>
